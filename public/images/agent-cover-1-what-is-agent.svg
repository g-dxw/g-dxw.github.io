<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <radialGradient id="brainGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e87b35" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#e87b35" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g opacity="0.08">
    <circle cx="160" cy="180" r="6" fill="#2d2d2a"/>
    <circle cx="140" cy="220" r="4" fill="#2d2d2a"/>
    <circle cx="200" cy="200" r="3" fill="#2d2d2a"/>
    <circle cx="1440" cy="720" r="5" fill="#2d2d2a"/>
    <circle cx="1480" cy="680" r="4" fill="#2d2d2a"/>
    <circle cx="1420" cy="750" r="3" fill="#2d2d2a"/>
    <circle cx="120" cy="720" r="4" fill="#2d2d2a"/>
    <circle cx="1500" cy="180" r="5" fill="#2d2d2a"/>
  </g>

  <g transform="translate(800, 470)">
    <circle r="170" fill="url(#brainGlow)"/>
    <circle r="120" fill="#ffffff" stroke="#e87b35" stroke-width="3" filter="url(#softShadow)"/>

    <g transform="translate(0, 0)" fill="none" stroke="#e87b35" stroke-width="2.5" stroke-linecap="round">
      <path d="M -55,-20 C -65,-50 -30,-75 0,-65 C 30,-75 65,-50 55,-20"/>
      <path d="M -50,0 C -60,-25 -25,-50 0,-40 C 25,-50 60,-25 50,0"/>
      <path d="M -45,20 C -55,0 -20,-25 0,-15 C 20,-25 55,0 45,20"/>
      <path d="M -35,35 C -45,15 -15,-5 0,5 C 15,-5 45,15 35,35"/>
      <path d="M 0,-65 L 0,50"/>
      <path d="M -30,-50 L -30,30"/>
      <path d="M 30,-50 L 30,30"/>
      <circle cx="-15" cy="-30" r="4" fill="#e87b35" stroke="none"/>
      <circle cx="20" cy="-10" r="4" fill="#e87b35" stroke="none"/>
      <circle cx="-5" cy="20" r="4" fill="#e87b35" stroke="none"/>
    </g>

    <text y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#2d2d2a">AI Agent</text>
    <text y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#6b6b68">LLM 大脑 + 目标 + 工具</text>
  </g>

  <g transform="translate(280, 470)">
    <g stroke="#e87b35" stroke-width="2" fill="none" stroke-dasharray="6 5" opacity="0.6">
      <path d="M 140,0 L 350,0"/>
    </g>
    <rect x="-80" y="-80" width="160" height="160" rx="16" fill="#ffffff" stroke="#e8e6e0" stroke-width="2" filter="url(#softShadow)"/>
    <g transform="translate(0, -10)" fill="#e87b35">
      <path d="M -20,30 L 20,30 L 20,-10 L 0,-30 L -20,-10 Z" fill="#e87b35"/>
      <rect x="-20" y="30" width="40" height="12" rx="2" fill="#d06a2a"/>
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    </g>
    <text y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2d2d2a">Goal</text>
  </g>

  <g transform="translate(1320, 470)">
    <g stroke="#e87b35" stroke-width="2" fill="none" stroke-dasharray="6 5" opacity="0.6">
      <path d="M -350,0 L -140,0"/>
    </g>
    <rect x="-90" y="-80" width="180" height="160" rx="16" fill="#ffffff" stroke="#e8e6e0" stroke-width="2" filter="url(#softShadow)"/>
    <g transform="translate(0, -5)" fill="none" stroke="#e87b35" stroke-width="2.5" stroke-linecap="round">
      <rect x="-28" y="-25" width="22" height="50" rx="3" fill="#fff5ee" stroke="#e87b35"/>
      <rect x="6" y="-25" width="22" height="50" rx="3" fill="#fff5ee" stroke="#e87b35"/>
      <circle cx="-17" cy="-30" r="5" fill="#fff5ee" stroke="#e87b35"/>
      <circle cx="17" cy="-30" r="5" fill="#fff5ee" stroke="#e87b35"/>
      <line x1="-17" y1="-10" x2="-17" y2="10" stroke="#e87b35" stroke-width="1.5"/>
      <line x1="17" y1="-10" x2="17" y2="10" stroke="#e87b35" stroke-width="1.5"/>
      <path d="M -28,20 L -20,28 L 20,28 L 28,20" fill="#fff5ee"/>
    </g>
    <text y="65" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#2d2d2a">Tools</text>
  </g>

  <g transform="translate(800, 95)">
    <text text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e87b35" letter-spacing="6">AGENT INIT 01</text>
  </g>
</svg>
