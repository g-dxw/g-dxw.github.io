<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560">
  <defs>
    <linearGradient id="leftBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff8f0"/>
      <stop offset="100%" style="stop-color:#fafaf8"/>
    </linearGradient>
    <linearGradient id="rightBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fafaf8"/>
      <stop offset="100%" style="stop-color:#f0f0ee"/>
    </linearGradient>
    <filter id="itemShadow" x="-5%" y="-10%" width="110%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="560" fill="#fafaf8" rx="16"/>

  <!-- 标题 -->
  <text x="600" y="52" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#2d2d2a">什么时候描述现象？什么时候直接命令？</text>

  <!-- 中间分割 -->
  <line x1="600" y1="80" x2="600" y2="520" stroke="#e5e5df" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- ========== 左侧：适合描述现象 ========== -->
  <g>
    <rect x="40" y="80" width="520" height="440" rx="12" fill="url(#leftBg)"/>
    <text x="300" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#e87b35">✓ 适合描述现象</text>
    <text x="300" y="156" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#6b6b65">根因不明 / 需要分析判断</text>

    <!-- 项目 1 -->
    <g filter="url(#itemShadow)">
      <rect x="70" y="180" width="460" height="56" rx="10" fill="#ffffff" stroke="#e87b35" stroke-width="1.5"/>
      <!-- 图标：bug -->
      <g transform="translate(90, 196)">
        <circle cx="12" cy="12" r="10" fill="none" stroke="#e87b35" stroke-width="1.5"/>
        <line x1="12" y1="2" x2="12" y2="-2" stroke="#e87b35" stroke-width="1.5"/>
        <line x1="2" y1="12" x2="-2" y2="12" stroke="#e87b35" stroke-width="1.5"/>
        <line x1="22" y1="12" x2="26" y2="12" stroke="#e87b35" stroke-width="1.5"/>
        <circle cx="8" cy="10" r="1.5" fill="#e87b35"/>
        <circle cx="16" cy="10" r="1.5" fill="#e87b35"/>
      </g>
      <text x="130" y="214" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">调试 / 排查 bug</text>
    </g>

    <!-- 项目 2 -->
    <g filter="url(#itemShadow)">
      <rect x="70" y="250" width="460" height="56" rx="10" fill="#ffffff" stroke="#f0984a" stroke-width="1"/>
      <g transform="translate(90, 266)">
        <circle cx="12" cy="12" r="10" fill="none" stroke="#f0984a" stroke-width="1.5"/>
        <text x="12" y="16" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#f0984a">?</text>
      </g>
      <text x="130" y="284" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">根因不明的问题</text>
    </g>

    <!-- 项目 3 -->
    <g filter="url(#itemShadow)">
      <rect x="70" y="320" width="460" height="56" rx="10" fill="#ffffff" stroke="#f0984a" stroke-width="1"/>
      <g transform="translate(90, 336)">
        <path d="M2,20 L12,4 L22,20 Z" fill="none" stroke="#f0984a" stroke-width="1.5"/>
        <line x1="7" y1="14" x2="17" y2="14" stroke="#f0984a" stroke-width="1.5"/>
        <line x1="12" y1="10" x2="12" y2="20" stroke="#f0984a" stroke-width="1.5"/>
      </g>
      <text x="130" y="354" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">复杂设计决策</text>
    </g>

    <!-- 项目 4 -->
    <g filter="url(#itemShadow)">
      <rect x="70" y="390" width="460" height="56" rx="10" fill="#ffffff" stroke="#f0984a" stroke-width="1"/>
      <g transform="translate(90, 406)">
        <path d="M4,22 L12,6 L20,22" fill="none" stroke="#f0984a" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="20" r="2" fill="#f0984a"/>
      </g>
      <text x="130" y="424" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">自己拿不准解法</text>
    </g>

    <!-- 判断标准 -->
    <text x="300" y="490" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#e87b35">判断：你不确定为什么 → 描述现象</text>
  </g>

  <!-- ========== 右侧：适合直接命令 ========== -->
  <g>
    <rect x="640" y="80" width="520" height="440" rx="12" fill="url(#rightBg)"/>
    <text x="900" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#6b6b65">✓ 适合直接命令</text>
    <text x="900" y="156" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#99998f">定义明确 / 机械性任务</text>

    <!-- 项目 1 -->
    <g filter="url(#itemShadow)">
      <rect x="670" y="180" width="460" height="56" rx="10" fill="#ffffff" stroke="#c5c5c0" stroke-width="1.5"/>
      <g transform="translate(690, 196)">
        <rect x="2" y="4" width="20" height="16" rx="2" fill="none" stroke="#6b6b65" stroke-width="1.5"/>
        <line x1="6" y1="10" x2="18" y2="10" stroke="#6b6b65" stroke-width="1.5"/>
        <line x1="6" y1="14" x2="14" y2="14" stroke="#99998f" stroke-width="1.5"/>
        <path d="M8,2 L8,6" stroke="#6b6b65" stroke-width="1.5"/>
        <path d="M16,2 L16,6" stroke="#6b6b65" stroke-width="1.5"/>
      </g>
      <text x="730" y="214" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">重命名 / 重构</text>
    </g>

    <!-- 项目 2 -->
    <g filter="url(#itemShadow)">
      <rect x="670" y="250" width="460" height="56" rx="10" fill="#ffffff" stroke="#d5d5d0" stroke-width="1"/>
      <g transform="translate(690, 266)">
        <rect x="2" y="2" width="10" height="20" rx="1" fill="none" stroke="#6b6b65" stroke-width="1.5"/>
        <rect x="12" y="6" width="10" height="16" rx="1" fill="none" stroke="#99998f" stroke-width="1.5"/>
        <path d="M5,8 L9,8" stroke="#6b6b65" stroke-width="1.5"/>
        <path d="M5,12 L9,12" stroke="#6b6b65" stroke-width="1.5"/>
      </g>
      <text x="730" y="284" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">格式转换 / 补类型</text>
    </g>

    <!-- 项目 3 -->
    <g filter="url(#itemShadow)">
      <rect x="670" y="320" width="460" height="56" rx="10" fill="#ffffff" stroke="#d5d5d0" stroke-width="1"/>
      <g transform="translate(690, 336)">
        <path d="M4,20 L12,4 L20,20" fill="none" stroke="#6b6b65" stroke-width="1.5"/>
        <line x1="12" y1="8" x2="12" y2="20" stroke="#6b6b65" stroke-width="1.5"/>
        <line x1="8" y1="14" x2="16" y2="14" stroke="#99998f" stroke-width="1.5"/>
      </g>
      <text x="730" y="354" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">按明确规范改写</text>
    </g>

    <!-- 项目 4 -->
    <g filter="url(#itemShadow)">
      <rect x="670" y="390" width="460" height="56" rx="10" fill="#ffffff" stroke="#d5d5d0" stroke-width="1"/>
      <g transform="translate(690, 406)">
        <path d="M2,12 L22,12" stroke="#6b6b65" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M16,6 L22,12 L16,18" stroke="#6b6b65" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <circle cx="6" cy="12" r="2" fill="#99998f"/>
      </g>
      <text x="730" y="424" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#2d2d2a">重复性 / 批量操作</text>
    </g>

    <!-- 判断标准 -->
    <text x="900" y="490" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" fill="#6b6b65">判断：你确定做什么 → 直接命令</text>
  </g>
</svg>
