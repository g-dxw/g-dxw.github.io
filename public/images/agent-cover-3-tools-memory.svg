<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e87b35"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg3)"/>

  <g opacity="0.07">
    <circle cx="160" cy="180" r="6" fill="#2d2d2a"/>
    <circle cx="140" cy="220" r="4" fill="#2d2d2a"/>
    <circle cx="200" cy="200" r="3" fill="#2d2d2a"/>
    <circle cx="1440" cy="720" r="5" fill="#2d2d2a"/>
    <circle cx="1480" cy="680" r="4" fill="#2d2d2a"/>
    <circle cx="1420" cy="750" r="3" fill="#2d2d2a"/>
    <circle cx="120" cy="720" r="4" fill="#2d2d2a"/>
    <circle cx="1500" cy="180" r="5" fill="#2d2d2a"/>
  </g>

  <g transform="translate(800, 460)">
    <circle r="220" fill="none" stroke="#e8e6e0" stroke-width="2" stroke-dasharray="4 8"/>

    <path d="M 0,-220
             A 220,220 0 1,1 -0.1,-220"
          fill="none" stroke="#e87b35" stroke-width="3"
          stroke-dasharray="12 8" stroke-linecap="round"
          marker-end="url(#arrow3)" opacity="0.8"/>

    <g transform="translate(0, -220)">
      <circle r="48" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <g stroke="#e87b35" stroke-width="2.5" fill="none" stroke-linecap="round">
        <circle cx="0" cy="0" r="14"/>
        <line x1="0" y1="-14" x2="0" y2="-24"/>
        <line x1="9.9" y1="-9.9" x2="17" y2="-17"/>
        <line x1="14" y1="0" x2="24" y2="0"/>
        <line x1="-9.9" y1="-9.9" x2="-17" y2="-17"/>
      </g>
      <text y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2d2d2a">感知</text>
    </g>

    <g transform="translate(220, 0)">
      <circle r="48" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <g transform="translate(0, 0)" fill="none" stroke="#e87b35" stroke-width="2.5" stroke-linecap="round">
        <path d="M -14,-4 L 0,-16 L 14,-4"/>
        <path d="M -14,4 L 0,16 L 14,4"/>
      </g>
      <text y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2d2d2a">推理</text>
    </g>

    <g transform="translate(0, 220)">
      <circle r="48" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <polygon points="-12,-16 16,0 -12,16" fill="#e87b35"/>
      <text y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2d2d2a">行动</text>
    </g>

    <g transform="translate(-220, 0)">
      <circle r="48" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <g stroke="#e87b35" stroke-width="2.5" fill="none" stroke-linecap="round">
        <path d="M -16,-10 L 0,6 L 16,-12"/>
        <line x1="-16" y1="14" x2="16" y2="14"/>
      </g>
      <text y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2d2d2a">观察</text>
    </g>
  </g>

  <g transform="translate(200, 460)">
    <rect x="-80" y="-90" width="160" height="180" rx="14" fill="#ffffff" stroke="#e8e6e0" stroke-width="2" filter="url(#softShadow)"/>
    <g transform="translate(0, -20)" fill="none" stroke="#e87b35" stroke-width="2.5" stroke-linecap="round">
      <rect x="-28" y="-28" width="22" height="50" rx="3" fill="#fff5ee" stroke="#e87b35"/>
      <rect x="6" y="-28" width="22" height="50" rx="3" fill="#fff5ee" stroke="#e87b35"/>
      <circle cx="-17" cy="-34" r="5" fill="#fff5ee" stroke="#e87b35"/>
      <circle cx="17" cy="-34" r="5" fill="#fff5ee" stroke="#e87b35"/>
    </g>
    <text y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2d2d2a">工具</text>
  </g>

  <g transform="translate(1400, 460)">
    <rect x="-80" y="-90" width="160" height="180" rx="14" fill="#ffffff" stroke="#e8e6e0" stroke-width="2" filter="url(#softShadow)"/>
    <g transform="translate(0, -15)" fill="none" stroke="#e87b35" stroke-width="2.5">
      <ellipse cx="0" cy="-25" rx="22" ry="7" fill="#fff5ee"/>
      <path d="M -22,-25 L -22,18 A 22,7 0 0,0 22,18 L 22,-25"/>
      <line x1="-22" y1="-3" x2="22" y2="-3"/>
      <line x1="-22" y1="8" x2="22" y2="8"/>
    </g>
    <text y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#2d2d2a">记忆</text>
  </g>

  <g transform="translate(800, 110)">
    <text text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e87b35" letter-spacing="6">AGENT INIT 03</text>
  </g>

  <g transform="translate(800, 810)" opacity="0.5">
    <text text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#6b6b68">Agent Loop</text>
  </g>
</svg>
