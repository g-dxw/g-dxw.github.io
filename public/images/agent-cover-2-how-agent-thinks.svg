<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f5f0e8"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e87b35"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg2)"/>

  <g opacity="0.07">
    <circle cx="160" cy="180" r="6" fill="#2d2d2a"/>
    <circle cx="140" cy="220" r="4" fill="#2d2d2a"/>
    <circle cx="200" cy="200" r="3" fill="#2d2d2a"/>
    <circle cx="1440" cy="720" r="5" fill="#2d2d2a"/>
    <circle cx="1480" cy="680" r="4" fill="#2d2d2a"/>
    <circle cx="1420" cy="750" r="3" fill="#2d2d2a"/>
    <circle cx="120" cy="720" r="4" fill="#2d2d2a"/>
    <circle cx="1500" cy="180" r="5" fill="#2d2d2a"/>
  </g>

  <g transform="translate(800, 450)">
    <path d="M -580,80
             C -400,80 -420,-80 -220,-80
             C -50,-80 -80,100 120,100
             C 280,100 260,-80 440,-80
             C 560,-80 580,0 600,60"
          fill="none" stroke="#e8e6e0" stroke-width="3" stroke-dasharray="2 8" stroke-linecap="round"/>

    <g transform="translate(-580, 80)">
      <circle r="52" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <circle r="18" fill="#e87b35"/>
      <text y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#2d2d2a">Task</text>
    </g>

    <g transform="translate(-220, -80)">
      <circle r="52" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <path d="M -22,-8 L 22,-8 L 22,6 L 14,6 L 14,22 L -14,22 L -14,6 L -22,6 Z" fill="#e87b35"/>
      <text y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#2d2d2a">Plan</text>
    </g>

    <g transform="translate(120, 100)">
      <circle r="52" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <g stroke="#e87b35" stroke-width="2.5" fill="none" stroke-linecap="round">
        <line x1="-18" y1="-16" x2="18" y2="-16"/>
        <line x1="-18" y1="-4" x2="12" y2="-4"/>
        <line x1="-18" y1="8" x2="18" y2="8"/>
        <line x1="-18" y1="20" x2="8" y2="20"/>
      </g>
      <text y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#2d2d2a">Spec</text>
    </g>

    <g transform="translate(440, -80)">
      <circle r="52" fill="#ffffff" stroke="#e87b35" stroke-width="2.5" filter="url(#softShadow)"/>
      <polygon points="-16,-20 20,0 -16,20" fill="#e87b35"/>
      <text y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#2d2d2a">Execute</text>
    </g>

    <g transform="translate(600, 60)">
      <circle r="52" fill="#fff5ee" stroke="#e87b35" stroke-width="3" filter="url(#softShadow)"/>
      <path d="M -18,8 L -4,-8 L 16,12" fill="none" stroke="#e87b35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#2d2d2a">Verify</text>
    </g>

    <g stroke="#e87b35" stroke-width="2.5" fill="none" marker-end="url(#arrow2)" opacity="0.7">
      <path d="M -528,65
               C -420,65 -420,-65 -330,-70"/>
      <path d="M -168,-75
               C -60,-75 -20,85 60,88"/>
      <path d="M 172,80
               C 280,80 290,-60 380,-70"/>
      <path d="M 490,-68
               C 540,-65 560,-20 560,5"/>
    </g>
  </g>

  <g transform="translate(800, 130)">
    <text text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#e87b35" letter-spacing="6">AGENT INIT 02</text>
  </g>

  <g transform="translate(1450, 170)" opacity="0.6">
    <path d="M 0,0 q 30,-40 60,0 q 30,30 0,60 q -30,30 -60,0 q -30,-30 0,-60" fill="#fff5ee" stroke="#e87b35" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-size="28" fill="#e87b35">?</text>
  </g>
</svg>
